<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResolveJá - Marido de Aluguel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">

<script>
(function(){ emailjs.init("tBH2N7mvqgQ82bB10"); })();
</script>

<!-- HEADER -->
<header class="bg-blue-600 text-white p-4">
  <div class="max-w-6xl mx-auto flex justify-between">
    <h1 class="text-2xl font-bold">ResolveJá</h1>
  </div>
</header>

<!-- HERO -->
<section class="text-center py-12 bg-white">
  <h2 class="text-3xl font-bold mb-4">Serviços rápidos e confiáveis</h2>
  <p class="mb-6">Montagem, reparos e instalações com agilidade</p>
  <a href="#contato" class="bg-blue-600 text-white px-6 py-3 rounded">Solicitar Serviço</a>
</section>

<!-- IMAGENS -->
<section class="max-w-6xl mx-auto py-12">
  <h3 class="text-2xl font-bold mb-6 text-center">Serviços Realizados</h3>
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <img src="https://source.unsplash.com/400x300/?handyman,repair" class="rounded shadow">
    <img src="https://source.unsplash.com/400x300/?electrician,work" class="rounded shadow">
    <img src="https://source.unsplash.com/400x300/?plumber,fixing" class="rounded shadow">
  </div>
</section>

<!-- VIDEO -->
<section class="max-w-4xl mx-auto py-12 text-center">
  <h3 class="text-2xl font-bold mb-6">Veja como trabalhamos</h3>
  <div class="aspect-video">
    <iframe class="w-full h-full rounded"
      src="https://www.youtube.com/embed/KYoe1sILA7E"
      title="Vídeo serviço"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>
</section>

<!-- FORMULÁRIO -->
<section id="contato" class="py-12 max-w-2xl mx-auto">
  <h3 class="text-2xl font-bold text-center mb-6">Solicitar Serviço</h3>
  <form class="bg-white p-6 rounded shadow space-y-4" onsubmit="enviarFormulario(event)">
    <input type="text" id="nome" placeholder="Nome" required class="w-full p-2 border rounded">
    <input type="tel" id="telefone" placeholder="Telefone" required class="w-full p-2 border rounded">
    <input type="text" id="localizacao" placeholder="Localização" required class="w-full p-2 border rounded">
    <input type="number" id="preco" placeholder="Preço estimado (R$)" required class="w-full p-2 border rounded">
    <textarea id="descricao" placeholder="Descreva o serviço" required class="w-full p-2 border rounded"></textarea>
    <button type="submit" class="bg-blue-600 text-white w-full py-2 rounded">Enviar</button>
  </form>
</section>

<!-- BOTÃO WHATSAPP -->
<a href="https://wa.me/5547992220340" target="_blank"
 class="fixed bottom-5 right-5 bg-green-500 text-white px-4 py-3 rounded-full shadow-lg">
  WhatsApp
</a>

<!-- SCRIPT -->
<script>
function enviarFormulario(e) {
  e.preventDefault();

  const params = {
    nome: document.getElementById('nome').value,
    telefone: document.getElementById('telefone').value,
    localizacao: document.getElementById('localizacao').value,
    preco: document.getElementById('preco').value,
    descricao: document.getElementById('descricao').value
  };

  emailjs.send("service_qcxv32s", "template_hjrzo2q", params)
  .then(() => {
    alert("Solicitação enviada com sucesso!");
  }, () => {
    alert("Erro ao enviar.");
  });
}
</script>

</body>
</html>
